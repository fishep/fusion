server:
  port: 9001
spring:
  application:
    name: gateway
  profiles:
    active: dev

jwt:
  # jwt 自定义秘钥
  secretKey: 12345678123456781234567812345678
  # 过期时间 单位：秒， 60 * 60 * 24
  expire: 86400

auth:
  guest:
    # 不认证的uri正则表达式，多条规则
    routes: '/api/user/auth/*, /api/user/auth/register, /api/user/auth/login'
#    routes:
#      - '/api/user/auth/register'
#      - '/api/user/auth/login'
#      - '/api/user/auth/*'